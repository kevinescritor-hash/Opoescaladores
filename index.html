<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opoescaladores PWA</title>
    <link rel="manifest" href="manifest.json">
    
<button id="toggle-panel" onclick="togglePanel()" style="position:fixed; top:20px; left:20px; z-index:2000; border-radius:50%; width:50px; height:50px; font-size:1.5rem; background:rgba(255,255,255,0.2); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.3); color:white;">⚙️</button>

<style>
    /* Panel lateral colapsable */
    .ui-panel {
        position: fixed;
        top: 0;
        left: -320px; /* Escondido por defecto */
        height: 100vh;
        width: 280px;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-right: 1px solid rgba(255, 255, 255, 0.2);
        padding: 80px 20px 20px 20px;
        display: flex; /* Cambiado de 'none' para que la transición funcione */
        flex-direction: column;
        gap: 15px;
        transition: left 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        z-index: 1500;
        box-shadow: 10px 0 30px rgba(0,0,0,0.5);
    }

    /* Clase para abrir el panel */
    .ui-panel.open {
        left: 0;
    }

    /* Estilo para que los inputs no ocupen mucho */
    .ui-panel input {
        background: rgba(255,255,255,0.1);
        color: white;
        border: 1px solid rgba(255,255,255,0.3);
        padding: 10px;
    }
    .ui-panel input::placeholder { color: rgba(255,255,255,0.5); }
</style>

</head>
<body>

<div class="sky">
    <div class="cloud" style="width:120px; height:40px; top:10%; animation-duration:30s;"></div>
    <div class="cloud" style="width:200px; height:60px; top:30%; animation-duration:50s; animation-delay:-5s;"></div>
    <div class="cloud" style="width:150px; height:45px; top:60%; animation-duration:40s; animation-delay:-15s;"></div>
</div>

<div id="login-screen">
    <h1 style="color:white; font-size: 3rem; margin-bottom: 20px;">⛰️ OpoClimb</h1>
    <button onclick="loginConGoogle()" style="padding: 15px 40px; border-radius: 50px;">Iniciar con Google</button>
</div>

<div class="world" id="world">
    <svg class="mountain-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
        <polygon class="mtn-body" points="50,0 100,100 0,100"/>
        <polygon class="mtn-snow" points="50,0 57.5,15 42.5,15"/>
    </svg>
</div>

<div class="ui-panel" id="app-content">
    <h3 style="color:white; margin:0;">🧗 Mi Progreso</h3>
    <input type="number" id="hInput" placeholder="Horas (ej: 2.5)">
    <input type="text" id="dInput" placeholder="¿Qué has estudiado?">
    <div style="display:flex; align-items:center; justify-content: space-between; color:white; font-size:0.9rem;">
        <span>Color del escalador:</span>
        <input type="color" id="colorPicker" value="#ffffff" style="width:40px; height:40px; padding:2px; background:none;">
    </div>
    <button onclick="addSession()">SUBIR MONTAÑA</button>
    <button class="btn-logout" onclick="auth.signOut()">Cerrar Sesión</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="app.js"></script>

</body>
</html>
